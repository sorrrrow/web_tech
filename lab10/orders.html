<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Construct — Заказы</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="orders.css">
</head>

<body data-page="orders">
  <header>
    <div class="header-container">
      <h1>Food Construct</h1>

      <nav class="site-nav">
        <a href="landing.html">Лендинг</a>
        <a href="index.html">О нас</a>
        <a href="lunch.html">Собрать ланч</a>
        <a href="order.html">Оформить заказ</a>
        <a id="active" href="orders.html">Заказы</a>
        <a href="#contacts">Контакты</a>
      </nav>
    </div>
  </header>

  <main class="container site-main">
    <section class="section">
      <h2 class="section-title">История заказов</h2>

      <div class="orders-hint" id="ordersHint">
        Загружаю заказы… ⏳
      </div>

      <div class="orders-table-wrap">
        <table class="orders-table" id="ordersTable">
          <thead>
            <tr>
              <th>№</th>
              <th>Дата оформления</th>
              <th>Состав заказа</th>
              <th>Стоимость</th>
              <th>Время доставки</th>
              <th>Действия</th>
            </tr>
          </thead>
          <tbody id="ordersTbody"></tbody>
        </table>
      </div>
    </section>

    <div id="toastRoot" class="toast-root" aria-live="polite"></div>
    <div id="modalRoot"></div>
  </main>

  <footer class="site-footer" id="contacts">
    <p>Позвонить нам <a href="tel:+70000000000">+7 (000) 000-00-00</a></p>
  </footer>

  <script src="js/api.js"></script>
